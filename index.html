<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hariom Bio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.card{
width:340px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
box-shadow:0 0 25px #00ff99;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00ff99;
object-fit:cover;
box-shadow:0 0 20px #00ff99;
}

h1{
margin-top:15px;
font-size:30px;
color:#00ff99;
}

.bio{
margin-top:10px;
color:#ccc;
line-height:24px;
}

.counter{
margin-top:15px;
font-size:18px;
color:#00ff99;
}

.link{
display:block;
margin-top:15px;
padding:15px;
border-radius:15px;
text-decoration:none;
background:#111;
color:white;
font-size:18px;
transition:0.3s;
border:1px solid #00ff99;
}

.link:hover{
background:#00ff99;
color:black;
transform:scale(1.05);
}

audio{
width:100%;
margin-top:20px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">

<img class="profile"
src="https://i.imgur.com/6VBx3io.png">

<h1>HARIOM</h1>

<div class="bio">
Gaming • Gym • Editing
</div>

<div class="counter">
Followers: <span id="followers">0</span>
</div>

<a class="link" href="#">
📸 Instagram
</a>

<a class="link" href="#">
▶ YouTube
</a>

<a class="link" href="#">
💬 Telegram
</a>

<a class="link" href="#">
🎮 My Games
</a>

<a class="link" href="#">
💰 Support Me
</a>

<audio controls autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const followers = document.getElementById("followers");

let count = 0;

let x = setInterval(()=>{

count += 111;

followers.innerText = count.toLocaleString();

if(count >= 50000){
clearInterval(x);
followers.innerText = "50,000+";
}

},30);

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff99";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x<0 || p.x>canvas.width) p.dx *= -1;
if(p.y<0 || p.y>canvas.height) p.dy *= -1;

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
